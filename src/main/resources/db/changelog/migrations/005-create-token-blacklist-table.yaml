databaseChangeLog:
  - changeSet:
      id: 005-create-token-blacklist-table
      author: expense-tracker
      changes:
        - createTable:
            tableName: token_blacklist
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: token_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: blacklisted_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            tableName: token_blacklist
            indexName: idx_token_blacklist_hash
            columns:
              - column:
                  name: token_hash

        - createIndex:
            tableName: token_blacklist
            indexName: idx_token_blacklist_expires
            columns:
              - column:
                  name: expires_at