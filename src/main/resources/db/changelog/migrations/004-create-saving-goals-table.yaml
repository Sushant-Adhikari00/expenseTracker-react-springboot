databaseChangeLog:
  - changeSet:
      id: 004-create-saving-goals-table
      author: expense-tracker
      changes:
        - createTable:
            tableName: saving_goals
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_saving_goals_user
                    references: users(id)
                    deleteCascade: true

              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: target_amount
                  type: DECIMAL(15, 2)
                  constraints:
                    nullable: false

              - column:
                  name: saved_amount
                  type: DECIMAL(15, 2)
                  defaultValueNumeric: 0.00
                  constraints:
                    nullable: false

              - column:
                  name: target_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: IN_PROGRESS
                  constraints:
                    nullable: false

              - column:
                  name: note
                  type: VARCHAR(500)

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            tableName: saving_goals
            indexName: idx_saving_goals_user_id
            columns:
              - column:
                  name: user_id


