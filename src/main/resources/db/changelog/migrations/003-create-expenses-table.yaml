databaseChangeLog:
  - changeSet:
      id: 003-create-expenses-table
      author: expense-tracker
      changes:
        - createTable:
            tableName: expenses
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_expenses_user
                    references: users(id)
                    deleteCascade: true

              - column:
                  name: title
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: DECIMAL(15, 2)
                  constraints:
                    nullable: false

              - column:
                  name: date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: category
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: note
                  type: VARCHAR(500)

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            tableName: expenses
            indexName: idx_expenses_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: expenses
            indexName: idx_expenses_date
            columns:
              - column:
                  name: date